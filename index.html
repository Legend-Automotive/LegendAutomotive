<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <link rel="preconnect" href="https://pxawiulologsydofnipi.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://pxawiulologsydofnipi.supabase.co">
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="description" content="Legend Automotive - Premium and luxury vehicles for discerning individuals. Contact us for your dream car.">
    <title>Legend Automotive | The Sovereign Gallery</title>
    <script>
        window.tailwind = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary, #c7a230)',
                        'on-primary': 'var(--color-on-primary, #ffffff)',
                        background: 'var(--color-background, #131313)',
                        'surface-card': 'var(--color-surface-container, #1c1b1b)',
                        'outline-variant': 'var(--color-outline-variant, rgba(224, 220, 213, 0.15))'
                    },
                    fontFamily: {
                        headline: ['Manrope', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/images/logo.jpg">
</head>

<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary">
    <div id="global-header-placeholder"></div>

    <main>
        <!-- Hero Section -->
        <section class="relative h-screen w-full flex items-center md:items-end overflow-hidden">
            <div class="absolute inset-0 z-0">
                <img id="hero-bg-image" fetchpriority="high" class="w-full h-full object-cover object-center scale-105 hidden" src="" />
                <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background/60"></div>
            </div>
            <div class="relative z-10 max-w-7xl mx-auto px-8 pt-24 md:pt-0 pb-12 md:pb-24 w-full mt-10 md:mt-0">
                <div class="max-w-2xl text-center md:text-left mx-auto md:mx-0 rtl:text-right">
                    <span
                        class="inline-block px-3 py-1 mb-6 glass-card rounded-full text-xs font-headline font-bold tracking-[0.2em] uppercase text-primary border border-outline-variant/15"
                        data-i18n="hero_subtitle">
                        Premier Collection
                    </span>
                    <h1 class="font-headline text-7xl md:text-8xl font-extrabold tracking-tighter leading-tight mb-8 text-primary"
                        data-i18n="hero_title">
                        Driving for the <br /><span class="italic">future</span>
                    </h1>
                    <div
                        class="flex flex-col md:flex-row gap-6 items-center md:items-center justify-center md:justify-start rtl:flex-row-reverse">
                        <button onclick="window.location.href='/inventory'"
                            class="w-full md:w-auto gold-shimmer text-on-primary font-headline font-bold px-10 py-5 rounded-md transition-all hover:brightness-110 active:scale-95 shadow-2xl"
                            data-i18n="explore_inventory">
                            Explore Inventory
                        </button>
                        <button onclick="window.location.href='/contact'"
                            class="w-full md:w-auto bg-surface-container-highest/40 backdrop-blur-md border border-outline-variant/15 text-on-surface font-headline font-semibold px-10 py-5 rounded-md hover:bg-surface-container-highest transition-colors"
                            data-i18n="personal_consult">
                            Personal Consult
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Featured Gallery (Vertical Cards) -->
        <section id="spotlight-section" class="py-32 overflow-hidden bg-background">
            <div class="max-w-7xl mx-auto px-8 mb-16">
                <h2 class="font-headline text-5xl font-extrabold tracking-tight text-center md:text-left rtl:text-right text-primary"
                    data-i18n="the_spotlight">The Spotlight</h2>
            </div>
            <div class="max-w-3xl mx-auto">
                <div id="trending-container" class="flex flex-col gap-12 px-8 pb-12">
                    <!-- injected by JS -->
                </div>
            </div>
        </section>
    </main>

    <div id="global-footer-placeholder"></div>

    <div id="global-mobile-menu-placeholder"></div>
    <div id="global-contact-popup-placeholder"></div>
    <script src="components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="db/products.js"></script>
    <script src="db/brands.js"></script>
    <script src="db/messages.js"></script>
    <script src="db/settings.js"></script>
    <script src="script.js"></script>
</body>

</html>
