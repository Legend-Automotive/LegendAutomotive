<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="description" content="Legend Automotive - Premium and luxury vehicles for discerning individuals. Contact us for your dream car.">
    <title>Contact Us | Legend Automotive</title>
    <script>
        window.tailwind = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary, #c7a230)',
                        'on-primary': 'var(--color-on-primary, #ffffff)',
                        background: 'var(--color-background, #131313)',
                        'surface-card': 'var(--color-surface-container, #1c1b1b)',
                        'outline-variant': 'var(--color-outline-variant, rgba(224, 220, 213, 0.15))'
                    },
                    fontFamily: {
                        headline: ['Manrope', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/images/logo.jpg">
</head>

<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary">
    <div id="global-header-placeholder"></div>

    <main class="pt-32 pb-24">
        <!-- Hero Section -->
        <section class="max-w-7xl mx-auto px-8 mb-24 rtl:text-right">
            <span class="font-manrope text-primary tracking-[0.3em] uppercase text-xs font-bold mb-4 block"
                data-i18n="nav_contact">Connect with Excellence</span>
            <h1
                class="font-manrope text-6xl md:text-8xl font-extrabold tracking-tighter leading-none text-primary mb-8">
                The <span class="text-on-surface italic">Legend</span> Awaits.
            </h1>
        </section>

        <!-- Main Content Grid -->
        <section class="max-w-7xl mx-auto px-8 grid grid-cols-1 lg:grid-cols-12 gap-12">
            <!-- Contact Form Area -->
            <div class="lg:col-span-7 bg-surface-container-low p-10 rounded-xl relative overflow-hidden">
                <h2 class="font-manrope text-3xl font-bold text-on-surface mb-10 tracking-tight"
                    data-i18n="inquiry_portal">Inquiry Portal</h2>
                <form id="contact-form" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="relative rtl:text-right">
                            <label
                                class="block text-on-surface-variant text-xs uppercase tracking-widest font-semibold mb-2 ml-1"
                                data-i18n="full_name">Full Name</label>
                            <input
                                class="w-full bg-surface-container-lowest border-none p-4 text-on-surface placeholder-neutral-700 focus:ring-0 transition-all duration-300"
                                id="c-name" placeholder="John Doe" required type="text" />
                        </div>
                        <div class="relative rtl:text-right">
                            <label class="block text-on-surface-variant text-xs uppercase tracking-widest font-semibold mb-2 ml-1" data-i18n="email_address">Email Address</label>
                            <input class="w-full bg-surface-container-lowest border-none p-4 text-on-surface placeholder-neutral-700 focus:ring-0 transition-all duration-300" id="c-email" placeholder="john@example.com" required type="email" oninput="this.value=this.value.replace(/\s/g, '')"/>
                        </div>
                    </div>
                    <div class="relative rtl:text-right">
                        <label
                            class="block text-on-surface-variant text-xs uppercase tracking-widest font-semibold mb-2 ml-1"
                            data-i18n="subject">Subject</label>
                        <input
                            class="w-full bg-surface-container-lowest border-none p-4 text-on-surface placeholder-neutral-700 focus:ring-0 transition-all duration-300"
                            id="c-interest" placeholder="General Inquiry" required type="text" />
                    </div>
                    <div class="relative rtl:text-right">
                        <label
                            class="block text-on-surface-variant text-xs uppercase tracking-widest font-semibold mb-2 ml-1"
                            data-i18n="your_message">Your Message</label>
                        <textarea
                            class="w-full bg-surface-container-lowest border-none p-4 text-on-surface placeholder-neutral-700 focus:ring-0 transition-all duration-300"
                            id="c-message" placeholder="Tell us about your requirements..." required
                            rows="5"></textarea>
                    </div>
                    <button
                        class="w-full py-4 bg-primary text-on-primary font-manrope font-extrabold uppercase tracking-widest text-sm rounded-md hover:brightness-110 shadow-[0_0_20px_rgba(199,162,48,0.3)] transition-all duration-300 transform active:scale-[0.98]"
                        type="submit" data-i18n="dispatch_inquiry">
                        Dispatch Inquiry
                    </button>
                </form>
            </div>

            <!-- Sidebar Info -->
            <div class="lg:col-span-5 flex flex-col gap-8">
                <div class="grid grid-cols-1 gap-6">
                    <a id="contact-phone-link" href="tel:#"
                        class="bg-surface-container-high p-8 rounded-xl flex items-center gap-6 group hover:translate-x-1 transition-transform duration-300">
                        <div
                            class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center text-primary">
                            <span class="material-symbols-outlined text-3xl">call</span>
                        </div>
                        <div class="rtl:text-right">
                            <p class="text-on-surface-variant text-xs uppercase tracking-widest mb-1"
                                data-i18n="direct_line">Direct Line</p>
                            <p id="contact-phone-display" class="text-xl font-bold font-manrope">+20 106 442 4446</p>
                        </div>
                    </a>
                </div>
                <!-- Social Links -->
                <div class="bg-surface-container-high p-8 rounded-xl">
                    <p class="text-on-surface-variant text-xs uppercase tracking-widest mb-6" data-i18n="stay_updated">
                        Stay Connected</p>
                    <div class="grid grid-cols-5 gap-4">
                        <a id="social-instagram-contact" href="#"
                            class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary hover:bg-primary hover:text-on-primary transition-all">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                            </svg>
                        </a>
                        <a id="social-facebook-contact" href="#"
                            class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary hover:bg-primary hover:text-on-primary transition-all">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                            </svg>
                        </a>
                        <a id="social-tiktok-contact" href="#"
                            class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary hover:bg-primary hover:text-on-primary transition-all">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
                            </svg>
                        </a>
                        <a id="social-whatsapp-contact" href="#"
                            class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary hover:bg-primary hover:text-on-primary transition-all">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
                            </svg>
                        </a>
                        <a id="social-phone-contact" href="#"
                            class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary hover:bg-primary hover:text-on-primary transition-all">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.28-2.28a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                                </path>
                            </svg>
                        </a>
                    </div>
                </div>

                <!-- Interactive Map -->
                <div id="map-container" class="flex-grow min-h-[300px] rounded-xl overflow-hidden relative group">
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center animate-pulse">
                            <div class="w-4 h-4 bg-on-primary rounded-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="global-footer-placeholder"></div>

    <div id="global-mobile-menu-placeholder"></div>
    <div id="global-contact-popup-placeholder"></div>
    <script src="components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="db/products.js"></script>
    <script src="db/brands.js"></script>
    <script src="db/messages.js"></script>
    <script src="db/settings.js"></script>
    <script src="script.js"></script>
</body>

</html>
