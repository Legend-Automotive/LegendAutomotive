<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="description" content="Legend Automotive - Premium and luxury vehicles for discerning individuals. Contact us for your dream car.">
    <title>Explore Collection | Legend Automotive</title>
    <script>
        window.tailwind = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary, #c7a230)',
                        'on-primary': 'var(--color-on-primary, #ffffff)',
                        background: 'var(--color-background, #131313)',
                        'surface-card': 'var(--color-surface-container, #1c1b1b)',
                        'outline-variant': 'var(--color-outline-variant, rgba(224, 220, 213, 0.15))'
                    },
                    fontFamily: {
                        headline: ['Manrope', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/images/logo.jpg">
</head>

<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary">
    <div id="global-header-placeholder"></div>
        </div>
    </header>

    <main class="pt-32 pb-20 px-8 max-w-7xl mx-auto">
        <!-- Hero Title Section -->
        <div class="mb-16 rtl:text-right">
            <h1 class="font-headline text-6xl font-extrabold tracking-tighter text-primary mb-4">
                THE <span class="italic text-on-surface">SOVEREIGN</span> COLLECTION
            </h1>
            <p class="text-on-surface-variant max-w-2xl font-body text-lg leading-relaxed">
                Discover the pinnacle of sustainable performance. Every vehicle in our gallery is hand-selected for its
                legendary status and uncompromising luxury.
            </p>
        </div>

        <div class="flex flex-col lg:flex-row gap-12">
            <!-- Sidebar Filters -->
            <aside class="w-full lg:w-72 flex-shrink-0 space-y-12">
                <!-- Search Filter -->
                <div class="space-y-4 rtl:text-right">
                    <label class="font-headline font-bold text-xs uppercase tracking-widest text-primary"
                        data-i18n="search_cars">Search</label>
                    <input
                        class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary rounded-md py-3 px-4 text-on-surface placeholder:text-neutral-600 transition-all"
                        id="search-input" placeholder="Model or Brand..." type="text"
                        data-i18n-placeholder="search_cars" />
                </div>
                <!-- Brand Filter -->
                <div class="space-y-4 rtl:text-right">
                    <label class="font-headline font-bold text-xs uppercase tracking-widest text-primary"
                        data-i18n="filter_brand">Manufacturer</label>
                    <div id="brand-filters-container" class="flex flex-wrap gap-2"></div>
                </div>
                <!-- Price Range -->
                <div class="space-y-6 rtl:text-right">
                    <div class="flex justify-between items-center rtl:flex-row-reverse">
                        <label class="font-headline font-bold text-xs uppercase tracking-widest text-primary"
                            data-i18n="price_range">Price Range</label>
                        <span id="price-range-display" class="text-xs text-on-surface-variant font-mono"><span
                                id="price-min">0</span> - <span id="price-max">10M</span></span>
                    </div>
                    <div id="price-slider-wrapper" class="relative h-2 rounded-full mt-8">
                        <!-- Hidden value stores read by filterInventory -->
                        <input id="price-min-slider" type="range" class="sr-only" tabindex="-1">
                        <input id="price-max-slider" type="range" class="sr-only" tabindex="-1">
                        <div id="price-slider-track" class="absolute h-full w-full bg-neutral-700 rounded-full"></div>
                        <div id="price-slider-fill"
                            class="absolute h-full bg-primary rounded-full pointer-events-none z-10"></div>
                        <div id="price-min-thumb"
                            class="absolute top-1/2 -translate-y-1/2 w-5 h-5 bg-white border-2 border-primary rounded-full shadow-lg cursor-grab active:cursor-grabbing z-30">
                        </div>
                        <div id="price-max-thumb"
                            class="absolute top-1/2 -translate-y-1/2 w-5 h-5 bg-white border-2 border-primary rounded-full shadow-lg cursor-grab active:cursor-grabbing z-30">
                        </div>
                    </div>
                </div>
                <!-- Colors -->
                <div class="space-y-4 mb-6 rtl:text-right">
                    <label class="font-headline font-bold text-xs uppercase tracking-widest text-primary">Color</label>
                    <div id="color-filters-container" class="flex flex-wrap gap-2"></div>
                </div>
                <!-- Category Filter -->
                <div class="space-y-4 rtl:text-right">
                    <label class="font-headline font-bold text-xs uppercase tracking-widest text-primary"
                        data-i18n="filter_category">Category</label>
                    <select id="filter-category"
                        class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary rounded-md py-3 px-4 text-on-surface">
                        <option value="" data-i18n="filter_category">All Categories</option>
                    </select>
                </div>
            </aside>

            <!-- Vehicle Grid -->
            <div class="flex-grow">
                <div id="inventory-container" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-12"></div>
            </div>
        </div>
    </main>

    <div id="global-footer-placeholder"></div>

    <div id="global-mobile-menu-placeholder"></div>
    <div id="global-contact-popup-placeholder"></div>
    <script src="components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="db/products.js"></script>
    <script src="db/brands.js"></script>
    <script src="db/categories.js"></script>
    <script src="db/messages.js"></script>
    <script src="db/settings.js"></script>
    <script src="script.js"></script>
</body>

</html>
